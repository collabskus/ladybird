# .github/workflows/collabskus-release.yml
#
# Builds self-contained Ladybird binaries on every push to master.
# Linux  → AppImage  (x86_64)
# macOS  → zipped .app bundle (arm64)
# Publishes a GitHub Release tagged build-YYYYMMDD-<short sha>.
#
# Fixes applied vs previous version:
#   - Removed ppa:ubuntu-toolchain-r/test (caused 504 timeout; not needed on ubuntu-24.04)
#   - ubuntu-24.04 already ships gcc-14; clang-21 comes from LLVM apt directly
#   - vcpkg bootstrap script is Meta/Utils/build_vcpkg.py (not Meta/BuildVcpkg.py)
#   - macOS: explicit brew link for llvm@21 so clang-21 is actually on PATH
#   - Updated actions/checkout and actions/setup-python to Node 24-compatible versions
#   - macOS: use Homebrew clang-21 explicitly via CC/CXX rather than xcrun

name: collabskus Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  LLVM_VERSION: 21

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Linux x86_64 → AppImage ────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip3 install pyyaml requests six

      - name: Install apt dependencies
        run: |
          # ── LLVM apt repo ──────────────────────────────────────────────────
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] \
            http://apt.llvm.org/noble/ llvm-toolchain-noble-${LLVM_VERSION} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list

          # ── Kitware (CMake 3.30+) ──────────────────────────────────────────
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ noble main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list

          sudo apt-get update -y

          # ubuntu-24.04 ships gcc-14 and g++-14 natively — no PPA needed
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            bison \
            build-essential \
            ccache \
            cmake \
            curl \
            fonts-liberation2 \
            g++-14 \
            gcc-14 \
            git \
            clang-${LLVM_VERSION} \
            clang++-${LLVM_VERSION} \
            clang-tools-${LLVM_VERSION} \
            lld-${LLVM_VERSION} \
            libdrm-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libpulse-dev \
            libssl-dev \
            libstdc++-14-dev \
            libxkbcommon-dev \
            libtool \
            nasm \
            ninja-build \
            patchelf \
            pkg-config \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-wayland \
            tar \
            unzip \
            zip

          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-${LLVM_VERSION}   100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${LLVM_VERSION} 100
          sudo update-alternatives --install /usr/bin/lld     lld     /usr/bin/lld-${LLVM_VERSION}     100

          cmake --version
          clang --version
          ninja --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-tools
        run: |
          VERSION=1.243.0
          curl -fsSL "https://github.com/bytecodealliance/wasm-tools/releases/download/v${VERSION}/wasm-tools-${VERSION}-x86_64-linux.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin \
              "wasm-tools-${VERSION}-x86_64-linux/wasm-tools"
          wasm-tools --version

      - name: Bootstrap vcpkg
        run: python3 Meta/Utils/build_vcpkg.py

      - name: Configure (Distribution preset)
        run: |
          cmake --preset Distribution -B Build \
            -DCMAKE_C_COMPILER=clang-${LLVM_VERSION} \
            -DCMAKE_CXX_COMPILER=clang++-${LLVM_VERSION}

      - name: Build
        working-directory: ${{ github.workspace }}/Build
        run: cmake --build . --parallel $(nproc)

      - name: Install into staging prefix
        run: cmake --install Build --strip --prefix ${{ github.workspace }}/AppDir/usr

      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Write desktop entry and icon
        run: |
          mkdir -p AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cat > AppDir/usr/share/applications/ladybird.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=Ladybird
          Exec=Ladybird %u
          Icon=ladybird
          Type=Application
          Categories=Network;WebBrowser;
          MimeType=text/html;text/xml;application/xhtml+xml;x-scheme-handler/http;x-scheme-handler/https;
          DESKTOP
          ICON_SRC=$(find Build -name "*.png" 2>/dev/null | grep -i ladybird | head -1 || true)
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" AppDir/usr/share/icons/hicolor/256x256/apps/ladybird.png
          else
            python3 -c "
          import base64
          open('AppDir/usr/share/icons/hicolor/256x256/apps/ladybird.png','wb').write(
            base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==')
          )"
          fi

      - name: Build AppImage
        env:
          QMAKE: /usr/lib/qt6/bin/qmake6
        run: |
          COMMIT_SHORT="${GITHUB_SHA::8}"
          TIMESTAMP="$(date -u +%Y%m%d)"
          export VERSION="${TIMESTAMP}-${COMMIT_SHORT}"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          APPIMAGE=$(ls Ladybird*.AppImage 2>/dev/null | head -1 || ls *.AppImage | head -1)
          FINAL="Ladybird-${VERSION}-linux-x86_64.AppImage"
          mv "$APPIMAGE" "$FINAL"
          echo "APPIMAGE_PATH=${FINAL}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=build-${VERSION}" >> "$GITHUB_ENV"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ${{ env.APPIMAGE_PATH }}
          retention-days: 7

      - name: Save release tag
        run: echo "${{ env.RELEASE_TAG }}" > release-tag.txt

      - name: Upload release tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tag
          path: release-tag.txt
          retention-days: 7

  # ── macOS arm64 → zipped .app bundle ──────────────────────────────────────
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip3 install pyyaml requests six

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install \
            autoconf \
            autoconf-archive \
            automake \
            bash \
            ccache \
            coreutils \
            libtool \
            llvm@${LLVM_VERSION} \
            nasm \
            ninja \
            pkg-config \
            qt \
            unzip

      - name: Link llvm@21 and add to PATH
        run: |
          # Unlink any conflicting llvm version first, then link ours
          brew unlink llvm 2>/dev/null || true
          brew link --force --overwrite llvm@${LLVM_VERSION}
          LLVM_BIN="$(brew --prefix llvm@${LLVM_VERSION})/bin"
          echo "${LLVM_BIN}" >> "$GITHUB_PATH"
          # Verify immediately
          "${LLVM_BIN}/clang" --version
          "${LLVM_BIN}/clang++" --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-tools
        run: |
          VERSION=1.243.0
          curl -fsSL "https://github.com/bytecodealliance/wasm-tools/releases/download/v${VERSION}/wasm-tools-${VERSION}-aarch64-macos.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin \
              "wasm-tools-${VERSION}-aarch64-macos/wasm-tools"
          wasm-tools --version

      - name: Bootstrap vcpkg
        run: python3 Meta/Utils/build_vcpkg.py

      - name: Configure (Distribution preset)
        run: |
          LLVM_BIN="$(brew --prefix llvm@${LLVM_VERSION})/bin"
          cmake --preset Distribution -B Build \
            -DCMAKE_C_COMPILER="${LLVM_BIN}/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_BIN}/clang++"

      - name: Build
        working-directory: ${{ github.workspace }}/Build
        run: cmake --build . --parallel $(sysctl -n hw.logicalcpu)

      - name: Install into staging prefix
        run: cmake --install Build --strip --prefix ${{ github.workspace }}/Install

      - name: Bundle and zip .app
        run: |
          COMMIT_SHORT="${GITHUB_SHA::8}"
          TIMESTAMP="$(date -u +%Y%m%d)"
          VERSION="${TIMESTAMP}-${COMMIT_SHORT}"

          APP_BUNDLE=$(find Install -name "*.app" -maxdepth 5 | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: no .app found under Install/:"
            find Install | head -40
            exit 1
          fi
          echo "Found bundle: $APP_BUNDLE"

          FRAMEWORKS="$APP_BUNDLE/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          VCPKG_LIB="Build/vcpkg_installed/arm64-osx/lib"
          [ -d "$VCPKG_LIB" ] && cp -n "$VCPKG_LIB"/*.dylib "$FRAMEWORKS/" 2>/dev/null || true

          LOCAL_LIB="Build/lib"
          [ -d "$LOCAL_LIB" ] && cp -Rn "$LOCAL_LIB"/. "$FRAMEWORKS/" 2>/dev/null || true

          for EXE in "$APP_BUNDLE/Contents/MacOS"/*; do
            [ -f "$EXE" ] || continue
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$EXE" 2>/dev/null || true
          done

          ARCHIVE="Ladybird-${VERSION}-macos-arm64.zip"
          cd "$(dirname "$APP_BUNDLE")"
          zip -r --symlinks "${{ github.workspace }}/${ARCHIVE}" "$(basename "$APP_BUNDLE")"
          echo "MACOS_ARCHIVE=${{ github.workspace }}/${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: ${{ env.MACOS_ARCHIVE }}
          retention-days: 7

  # ── Publish Release ────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-24.04
    if: always() && (needs.build-linux.result == 'success' || needs.build-macos.result == 'success')

    steps:
      - name: Download Linux AppImage
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: dist/

      - name: Download macOS app
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: dist/

      - name: Download release tag
        uses: actions/download-artifact@v4
        with:
          name: release-tag
          path: .

      - name: Read release tag
        run: echo "RELEASE_TAG=$(cat release-tag.txt)" >> "$GITHUB_ENV"

      - name: List dist
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Ladybird ${{ env.RELEASE_TAG }}"
          body: |
            ## Ladybird Browser — automated build

            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`
            **Built at:** ${{ github.event.head_commit.timestamp }}

            ### Assets
            | File | Platform |
            |------|----------|
            | `*.AppImage` | Linux x86-64 — self-contained, no install needed |
            | `*.zip` | macOS arm64 — drag `.app` to `/Applications` |

            ### Linux usage
            ```bash
            chmod +x Ladybird-*.AppImage
            ./Ladybird-*.AppImage
            ```

            ### macOS usage
            Unzip, drag `Ladybird.app` to `/Applications`.
            First launch: right-click → Open to bypass Gatekeeper (unsigned build).

            > ⚠️ Unofficial pre-alpha builds from
            > [collabskus/ladybird](https://github.com/collabskus/ladybird),
            > tracking [LadybirdBrowser/ladybird](https://github.com/LadybirdBrowser/ladybird).
          files: dist/*
          make_latest: true
          fail_on_unmatched_files: false
